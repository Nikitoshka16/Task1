services:
  postgres:
    build: .
    container_name: real_estate_pg 
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5555:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - real_estate_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: real_estate_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    networks:
      - real_estate_network

  airflow:
    image: apache/airflow:2.8.1-python3.10
    container_name: real_estate_airflow  # ← новое имя
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - _PIP_ADDITIONAL_REQUIREMENTS=psycopg2-binary python-dotenv pandas sqlalchemy faker matplotlib numpy seaborn
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - PYTHONPATH=/opt/airflow/scripts
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./.env:/opt/airflow/scripts/.env
      - ./data:/opt/airflow/data
    networks:
      - real_estate_network
    command: >
      bash -c "
      airflow db init &&
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com &&
      airflow webserver --port 8080 &
      airflow scheduler
      "

volumes:
  pg_data:

networks:
  real_estate_network:
    driver: bridge